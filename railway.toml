# Default Railway config when Root Directory = repo root (`.`).
# Workers service: set Config file path to `apps/workers/railway.toml` in Railway UI.
[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
watchPatterns = ["apps/api/**", "packages/monitoring/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
