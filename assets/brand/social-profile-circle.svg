<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" fill="none">
  <!-- Optimized for circular crop (Instagram, YouTube, Facebook, X) -->
  <defs>
    <linearGradient id="brand" x1="280" y1="280" x2="800" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#064e3b"/>
      <stop offset="0.45" stop-color="#047857"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="#030014"/>
  <!-- Icon block ~48% of canvas  fits inside inscribed circle with margin -->
  <rect x="290" y="290" width="500" height="500" rx="112" fill="url(#brand)"/>
  <g transform="translate(540 540)" stroke="#ffffff" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="-72" cy="-39" r="44"/>
    <circle cx="72" cy="39" r="44"/>
    <path d="M-24 -7 L24 7"/>
    <path d="M-122 -39 H-47"/>
    <path d="M47 39 H122"/>
  </g>
</svg>
